<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Images Practice</title>
  </head>

  <body
    style="background-color: rgb(25, 25, 25); color: white; font-size: 25px"
  >
    <div>
      <p>images example</p>
      <!-- eager loading instructs browsers to immediately load images -->
      <img
        src="imgs/aaron-paul.jpg"
        alt="aaron paul image in early 2000s"
        title="Arron Paul"
        width="200"
        height="200"
        loading="eager"
      />

      <img
        src="imgs/Kurapika.jpg"
        alt="kurapika image"
        title="Kurapika"
        width="200"
        height="200"
        loading="eager"
      />

      <img
        src="imgs/kuzan.jpg"
        alt="kuzan image"
        title="Kuzan"
        width="200"
        height="200"
        loading="eager"
      />

      <img
        src="imgs/saul-goodman.jpg"
        alt="Saul Goodman image"
        title="Saul Goodman"
        width="200"
        height="200"
        loading="eager"
      />

      <img
        src="imgs/wonder-of-u.jpg"
        alt="Wonder Of U image"
        title="Wonder Of U"
        width="200px"
        height="200px"
        loading="eager"
      />
    </div>

    <div>
      <p>good aspect ratio vs bad aspect ratio example</p>
      <!--will automatically set height based of the width to maintain the aspect ratio-->
      <img
        src="imgs/cat-coding.jpg"
        alt="cat-coding"
        title="cat-coding"
        style="width: 25%; height: auto"
      />
      <!--wrong aspect ratio example-->
      <img
        src="imgs/cat-coding.jpg"
        alt="cat-coding"
        title="cat-coding"
        style="width: 25%; height: 200px"
      />
    </div>

    <div>
      <p>image from an absolute link</p>
      <img
        src="https://i.chzbgr.com/full/10385431808/hC3252FF1/p-wholesomebeancat"
        title="silly cat"
        alt="image from internet"
        width="10%"
        loading="auto"
      />
    </div>

    <p>Example of an Image that faild to load:</p>
    <img src="xyz" alt="failed image" />

    <div>
      <p>load images using lazy loading</p>
      <!--use lazy loading for images that don't show uo in the view port-->
      <img src="/imgs/cat-studying.jpg" alt="cat" width="10%" loading="lazy" />

      <img src="/imgs/cat-studying.jpg" alt="cat" width="10%" loading="lazy" />

      <img src="/imgs/cat-studying.jpg" alt="cat" width="10%" loading="lazy" />
    </div>
  </body>
</html>
